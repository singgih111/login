<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Signup</title>
    <link rel="stylesheet" href="signup/signup.css">
    <!-- Use compatibility mode scripts -->
    <script src="https://www.gstatic.com/firebasejs/9.19.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.19.0/firebase-auth-compat.js"></script>
</head>
<body>
    <div class="signup-container">
        <div class="signup-box">
            <h1>Sign Up</h1>
            <form id="signup-form" action="#" method="POST">
                <div class="form-group">
                    <label for="username">Username</label>
                    <input type="text" id="username" name="username" required placeholder="Enter your username">
                    <p id="username-error" style="display: none; color: red;">Username is required</p>
                </div>
                <div class="form-group">
                    <label for="email">Email</label>
                    <input type="email" id="email" name="email" required placeholder="Enter your email">
                    <p id="email-error" style="display: none; color: red;">Please enter a valid email address</p>
                </div>
                <div class="form-group">
                    <label for="password">Password</label>
                    <input type="password" id="password" name="password" required placeholder="Enter your password">
                    <p id="password-error" style="display: none; color: red;">Password is required</p>
                </div>
                <button type="button" id="signup-button">Sign Up</button>
            </form>
        </div>
    </div>
    <script src="signup/signup.js"></script>
</body>
</html>
