name: Azure Static Web Apps CI/CD

on:
  push:
    branches:
      - main  # or master, depending on your default branch
    
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v2
        
      - name: Set up Node.js
        uses: actions/setup-node@v2
        with:
          node-version: '14'
          
      - name: Build and Deploy to Azure Static Web Apps
        uses: Azure/static-web-apps-deploy@v1
        env:
          AZURE_STATIC_WEB_APPS_API_TOKEN: ${{ secrets.AZURE_STATIC_WEB_APPS_API_TOKEN }}
        with:
          app_location: "/"  # Path to your app's code
          api_location: "api"  # If you have a backend API, leave empty if not
          output_location: "build"  # Output folder after build (if needed)
          app_artifact_location: "build"  # Where your build output is located
